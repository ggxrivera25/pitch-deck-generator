[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  # With SSE streaming the connection stays open, avoiding function timeout.
  # Set to 26s (Netlify Pro max). Free tier is 10s but streaming bypasses it.
  included_files = ["**"]

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000

# Required env vars (set in Netlify dashboard):
# ANTHROPIC_API_KEY
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
